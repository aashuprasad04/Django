<head>
  <meta charset="UTF-8">

    .sap-select,
    .sap-textarea {
      background: #F0F2F4;
      cursor: not-allowed;
    }

    } */

<body>

  <app-header></app-header>

  <!-- BACK BUTTON
  <div style="padding:10px; background:#f0f0f0; border-bottom:1px solid #ccc;">
    <button onclick="goBack()" style="padding:6px 12px; font-size:16px; cursor:pointer;">← Back</button>
  </div> -->








  <div class="sap-container" id="viewEmpContainer">

    <!-- <div class="toolbar" style="justify-content: space-between; align-items: center;">

      <button class="sap-btn" onclick="goBack()"
        style="font-size: 14px; padding: 6px 12px; display: flex; align-items: center; gap: 6px;">

    <div class="toolbar" style="justify-content: space-between; align-items: center;">
      <button class="sap-btn" id="updateBtn" onclick="goBack()">Back</button>

      <div class="toolbar-buttons">
        <button class="sap-btn" id="updateBtn">Update</button>
        <button class="sap-btn" id="calcSalaryBtn">Calculate Salary</button>
      </div>
    </div>



    <!-- PANEL 1: BASIC DETAILS -->
    <div class="sap-panel">
      <div class="panel-header">
        <div class="panel-number">1</div>
        <div class="panel-title">Basic Details</div>
      </div>
      <div class="panel-body">
        <div class="form-row">
          <div class="form-group"><label class="form-label">Employee ID</label>
            <input type="text" id="empId" class="sap-input" readonly>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group"><label class="form-label">Labour Name</label>
            <input type="text" id="labourName" class="sap-input" readonly>
          </div>
          <div class="form-group"><label class="form-label">Father / Husband Name</label>
            <input type="text" id="fatherName" class="sap-input" readonly>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group"><label class="form-label">Gender</label>
            <input type="text" id="gender" class="sap-input" readonly>
          </div>
          <div class="form-group"><label class="form-label">Date of Birth</label>
            <input type="text" id="dob" class="sap-input" readonly>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group"><label class="form-label">Mobile Number</label>
            <input type="text" id="mobile" class="sap-input" readonly>
          </div>
          <div class="form-group"><label class="form-label">Alternate Mobile</label>
            <input type="text" id="altMobile" class="sap-input" readonly>
          </div>
        </div>
      </div>
    </div>

    <!-- PANEL 2: ADDRESS DETAILS -->
    <div class="sap-panel">
      <div class="panel-header">
        <div class="panel-number">2</div>
        <div class="panel-title">Address Details</div>
      </div>
      <div class="panel-body">
        <div class="form-row full-width">
          <div class="form-group"><label class="form-label">Current Address</label>
            <textarea id="address" class="sap-textarea" readonly></textarea>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group"><label class="form-label">City</label><input type="text" id="city" class="sap-input"
              readonly></div>
          <div class="form-group"><label class="form-label">State</label><input type="text" id="state" class="sap-input"
              readonly></div>
          <div class="form-group"><label class="form-label">PIN Code</label><input type="text" id="pincode"
              class="sap-input" readonly></div>
        </div>
      </div>
    </div>

    <!-- PANEL 3: WORK DETAILS -->
    <div class="sap-panel">
      <div class="panel-header">
        <div class="panel-number">3</div>
        <div class="panel-title">Work Details</div>
      </div>
      <div class="panel-body">
        <div class="form-row">
          <div class="form-group"><label class="form-label">Labour Type</label><input type="text" id="labourType"
              class="sap-input" readonly></div>
          <div class="form-group"><label class="form-label">Department / Trade</label><input type="text" id="department"
              class="sap-input" readonly></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label class="form-label">Daily Wage (₹)</label><input type="text" id="dailyWage"
              class="sap-input" readonly></div>
          <div class="form-group"><label class="form-label">Work Hours per Day</label><input type="text" id="workHours"
              class="sap-input" readonly></div>
          <div class="form-group"><label class="form-label">Hourly Rate (₹)</label><input type="text" id="hourlyRate"
              class="sap-input" readonly></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label class="form-label">Joining Date</label><input type="text" id="joiningDate"
              class="sap-input" readonly></div>
          <div class="form-group"><label class="form-label">Contractor Name</label><input type="text" id="contractor"
              class="sap-input" readonly></div>
        </div>
      </div>
    </div>

    <!-- PANEL 4: QUALIFICATION & SKILLS -->
    <div class="sap-panel">
      <div class="panel-header">
        <div class="panel-number">4</div>
        <div class="panel-title">Qualification & Skills</div>
      </div>
      <div class="panel-body">
        <div class="form-row">
          <div class="form-group"><label class="form-label">Education Level</label><input type="text" id="education"
              class="sap-input" readonly></div>
          <div class="form-group"><label class="form-label">Primary Skill</label><input type="text" id="primarySkill"
              class="sap-input" readonly></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label class="form-label">Experience (Years)</label><input type="text" id="experience"
              class="sap-input" readonly></div>
        </div>
      </div>
    </div>

    <!-- PANEL 5: GOVERNMENT DETAILS -->
    <div class="sap-panel">
      <div class="panel-header">
        <div class="panel-number">5</div>
        <div class="panel-title">Government & Statutory Details</div>
      </div>
      <div class="panel-body">
        <div class="form-row">
          <div class="form-group"><label class="form-label">Aadhaar Number</label><input type="text" id="aadhaar"
              class="sap-input" readonly></div>
          <div class="form-group"><label class="form-label">PAN Number</label><input type="text" id="pan"
              class="sap-input" readonly></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label class="form-label">PF Number</label><input type="text" id="pf"
              class="sap-input" readonly></div>
          <!-- <div class="form-group"><label class="form-label">UAN Number</label><input type="text" id="uan"
              class="sap-input" readonly></div> -->
          <div class="form-group"><label class="form-label">ESIC Number</label><input type="text" id="esic"
              class="sap-input" readonly></div>
        </div>
      </div>
    </div>

    <!-- PANEL 6: BANK DETAILS -->
    <div class="sap-panel">
      <div class="panel-header">
        <div class="panel-number">6</div>
        <div class="panel-title">Bank Details</div>
      </div>
      <div class="panel-body">
        <div class="form-row">
          <div class="form-group"><label class="form-label">Bank Name</label><input type="text" id="bankName"
              class="sap-input" readonly></div>
          <div class="form-group"><label class="form-label">Account Number</label><input type="text" id="accountNumber"
              class="sap-input" readonly></div>
          <div class="form-group"><label class="form-label">IFSC Code</label><input type="text" id="ifsc"
              class="sap-input" readonly></div>
          <div class="form-group"><label class="form-label">Account Holder Name</label><input type="text"
              id="accountHolder" class="sap-input" readonly></div>
        </div>
      </div>
    </div>

  </div>

</body>

</html>
