    {% load static %}

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Employee</title>

    <script src="{% static 'js/header.js' %}" defer></script>
      <script src="{% static 'js/config.js' %}" ></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            font-family: "Segoe UI", Tahoma, Arial, sans-serif;
            background: #DFEBF6;
            color: #1A1A1A;
            font-size: 15px;
        }

        :root {
            --sap-border-light: #D4DDE6;
            --sap-selected: #0A6ED1;
            --sap-panel-bg: #fff;
            --sap-border: #B8C7D6;
            --sap-btn-blue: #0070F2;
            --sap-btn-gray: #E0E5EA;
            --sap-shadow: 0 1px 3px rgba(0, 0, 0, .12);
        }

        .sap-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px 24px;
        }

        .toolbar {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 14px;
        }

        .toolbar-buttons {
            display: flex;
            gap: 8px;
        }

        .sap-panel {
            background: var(--sap-panel-bg);
            border: 1px solid var(--sap-border-light);
            border-radius: 8px;
            margin-bottom: 14px;
            box-shadow: var(--sap-shadow);
        }

        .panel-header {
            padding: 14px 18px;
            display: flex;
            align-items: center;
            gap: 12px;
            background: linear-gradient(#F7F9FB, #EDF2F7);
            border-bottom: 1px solid var(--sap-border-light);
        }

        .panel-number {
            width: 30px;
            height: 30px;
            background: var(--sap-selected);
            color: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }

        .panel-title {
            font-size: 16px;
            font-weight: 600;
        }

        .panel-body {
            padding: 20px;
        }

        .form-row {
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .form-label {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 6px;
        }

        .sap-input {
            height: 36px;
            padding: 8px 10px;
            border: 1px solid var(--sap-border);
            background: #FAFBFC;
            font-size: 15px;
            border-radius: 4px;
            transition: border-color 0.2s;
        }

        .sap-input:focus {
            outline: none;
            border-color: var(--sap-selected);
        }

        .sap-btn {
            padding: 8px 16px;
            background: var(--sap-btn-gray);
            border: 1px solid var(--sap-border);
            cursor: pointer;
            font-size: 14px;
            border-radius: 4px;
            transition: all 0.2s;
        }

        .sap-btn:hover {
            background: #D5DCE3;
        }

        .sap-btn-primary {
            background: var(--sap-btn-blue);
            color: #fff;
            border-color: var(--sap-btn-blue);
        }

        .sap-btn-primary:hover {
            background: #0060D1;
        }

        /* RESULTS TABLE */
        .results-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        .results-table thead {
            background: linear-gradient(#F7F9FB, #EDF2F7);
        }

        .results-table th {
            padding: 12px 14px;
            text-align: left;
            font-size: 14px;
            font-weight: 600;
            border-bottom: 2px solid var(--sap-border-light);
        }

        .results-table td {
            padding: 12px 14px;
            border-bottom: 1px solid var(--sap-border-light);
        }

        .results-table tbody tr {
            transition: background 0.2s;
        }

        .results-table tbody tr:hover {
            background: #F7F9FB;
        }

        .help-text {
            font-size: 13px;
            color: #6B7278;
        }

        .error-text {
            color: #BB0000;
            font-size: 14px;
        }

        .success-text {
            color: #0F7D3A;
            font-size: 14px;
        }

        .badge {
            display: inline-block;
            padding: 4px 10px;
            background: var(--sap-selected);
            color: #fff;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 600;
            margin-left: auto;
        }
    </style>
</head>

<body>

    <app-header></app-header>

    <div class="sap-container">

        <div class="toolbar">
            <div class="toolbar-buttons">
                <button class="sap-btn">🔍 Advanced Search</button>
            </div>
        </div>

        <!-- SEARCH PANEL -->
        <div class="sap-panel">
            <div class="panel-header">
                <div class="panel-number">1</div>
                <div class="panel-title">Search Employee</div>
            </div>

            <div class="panel-body">
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Employee ID / Name</label>
                        <input id="searchInput" class="sap-input" placeholder="Enter Emp ID or Name"
                            onkeyup="handleKeyPress(event)">
                    </div>

                    <div class="form-group" style="flex:0;">
                        <button class="sap-btn sap-btn-primary" onclick="searchEmp()">Search</button>
                    </div>
                </div>
                <div id="searchFeedback" style="margin-top:6px;"></div>
            </div>
        </div>

        <!-- RESULT PANEL -->
        <div class="sap-panel">
            <div class="panel-header">
                <div class="panel-number">2</div>
                <div class="panel-title">Search Results</div>
                <span id="resultCount" class="badge" style="display:none;">0</span>
            </div>

            <div class="panel-body" id="resultBox">
                <div class="help-text">Enter search criteria and click Search to find employees</div>
            </div>
        </div>

    </div>




    <script>
        const scriptURL = CONFIG.SCRIPT_URL;


        function handleKeyPress(event) {
            if (event.key === "Enter") {
                searchEmp();
            }
        }

        function searchEmp() {
            const v = document.getElementById("searchInput").value.trim();
            const feedback = document.getElementById("searchFeedback");
            const resultBox = document.getElementById("resultBox");
            const resultCount = document.getElementById("resultCount");

            if (!v) {
                feedback.innerHTML =
                    '<span class="error-text">⚠ Please enter a search term</span>';
                return;
            }

            feedback.innerHTML = "Searching...";
            resultBox.innerHTML = "";
            resultCount.style.display = "none";

            const params = new URLSearchParams({
                action: "search",
                key: v,
                token: sessionStorage.getItem("token")
            });

            fetch(scriptURL, {
                method: "POST",
                body: params
            })
                .then(res => res.json())
                .then(data => {
                    feedback.innerHTML = "";
                    if (!data || data.length === 0) {
                        resultBox.innerHTML = `<div class="error-text">❌ No results found for "${v}"</div>`;
                        resultCount.style.display = "none";
                        return;
                    }

                    resultCount.textContent = data.length;
                    resultCount.style.display = "inline-block";

                    let html = `<div class="success-text">✓ Found ${data.length} result(s)</div>
        <table class="results-table">
        <thead>
            <tr>
                <th>Employee ID</th>
                <th>Name</th>
                <th>Father Name</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>`;

                    data.forEach(emp => {
                        html += `
            <tr>
                <td>${emp.empId || "—"}</td>
                <td>${emp.labourName || "—"}</td>
                <td>${emp.fatherName || "—"}</td>
                <td>
                    <button class="sap-btn sap-btn-primary" onclick='viewDetails(${JSON.stringify(emp)})'>
                        View Details
                    </button>
                </td>
            </tr>`;
                    });

                    html += "</tbody></table>";
                    resultBox.innerHTML = html;
                })
                .catch(err => {
                    console.error(err);
                    feedback.innerHTML = '<span class="error-text">❌ Error fetching data</span>';
                });
        }

        function viewDetails(emp) {
            localStorage.setItem("selectedEmployee", JSON.stringify(emp));
            window.location.href = "/viewEmp2/";
        }

        window.addEventListener("load", () => {
            document.getElementById("searchInput").focus();
        });
    </script>






</body>

</html>
